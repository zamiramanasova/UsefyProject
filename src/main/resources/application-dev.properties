# ===== DEV Profile =====
# ??? ????????? ?????????? ?????????? PostgreSQL

# Server
server.port=8080

# PostgreSQL Connection (????? ?? .env)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Data initialization
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Logging (???????????)
logging.level.com.example.usefy=DEBUG

# Google Gemini ??? ??????????
spring.ai.vertex.ai.gemini.project-id=${GEMINI_PROJECT_ID:usefy-project-dev}
spring.ai.vertex.ai.gemini.location=${GEMINI_LOCATION:us-central1}
spring.ai.vertex.ai.gemini.api-key=${GEMINI_API_KEY}
spring.ai.vertex.ai.gemini.chat.options.model=gemini-2.0-flash
spring.ai.vertex.ai.gemini.chat.options.temperature=0.7
app.ai.provider=gemini