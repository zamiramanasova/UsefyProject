# PostgreSQL (???????? ??)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

# ???????? ?????????? data.sql ????? ???????? ??????
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Google Gemini ??? ??????????
spring.ai.vertex.ai.gemini.project-id=${GEMINI_PROJECT_ID:usefy-project-prod}
spring.ai.vertex.ai.gemini.location=${GEMINI_LOCATION:us-central1}
spring.ai.vertex.ai.gemini.api-key=${GEMINI_API_KEY}
spring.ai.vertex.ai.gemini.chat.options.model=gemini-2.0-flash
spring.ai.vertex.ai.gemini.chat.options.temperature=0.5
app.ai.provider=gemini
