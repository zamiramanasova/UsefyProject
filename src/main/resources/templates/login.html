<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход - LearnLoop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { max-width: 400px; margin: 100px auto; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="card shadow">
        <div class="card-header bg-white text-center py-4">
            <h3 class="mb-0">
                <i class="bi bi-chat-dots-fill me-2" style="color: #0d6efd;"></i>
                Usefy
            </h3>
            <p class="text-muted mt-2 mb-0">Войдите в свой аккаунт</p>
        </div>
        <div class="card-body p-4">
            <!-- Сообщение об ошибке -->
            <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                Неверный логин или пароль
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Сообщение о выходе -->
            <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                Вы успешно вышли из системы
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Форма входа -->
            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="bi bi-person me-2"></i>Имя пользователя
                    </label>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="Введите логин" required autofocus>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock me-2"></i>Пароль
                    </label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Введите пароль" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                </button>
            </form>

            <hr class="my-4">

            <p class="text-center text-muted mb-0">
                Нет аккаунта?
                <a href="/register" class="text-decoration-none">Зарегистрироваться</a>
            </p>
        </div>
    </div>

    <div class="text-center mt-3">
        <a href="/" class="text-muted text-decoration-none">
            <i class="bi bi-arrow-left me-1"></i>Вернуться на главную
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
