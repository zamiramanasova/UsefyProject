<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LearnLoop - Главная</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .welcome-card {
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="welcome-card">
    <div class="card shadow-lg border-0">
        <div class="card-body p-5 text-center">
            <h1 class="display-4 mb-4">
                <i class="bi bi-chat-dots-fill" style="color: #667eea;"></i>
                LearnLoop
            </h1>
            <p class="lead text-muted mb-4">Добро пожаловать в платформу для обучения с AI-ассистентом</p>

            <div class="d-grid gap-3">
                <a href="/register" class="btn btn-primary btn-lg">
                    <i class="bi bi-person-plus me-2"></i>Регистрация
                </a>
                <a href="/login" class="btn btn-outline-primary btn-lg">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Вход
                </a>
            </div>

            <hr class="my-4">

            <p class="text-muted small">
                Учитесь с удовольствием и задавайте вопросы AI
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
