<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Чат</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (опционально) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<h1>Чат</h1>

<div>
    <div th:each="msg : ${messages}">
        <b th:text="${msg.role}"></b>:
        <span th:text="${msg.content}"></span>
    </div>
</div>

<hr/>

<form th:action="@{/chats/{id}/message(id=${chatId})}" method="post">
    <input type="text" name="content" placeholder="Введите сообщение" required>
    <button type="submit">Отправить</button>
</form>

<br/>
<a href="/chats">Назад к чатам</a>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
