<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Профиль')}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div class="row">
        <!-- Левая колонка - информация о пользователе -->
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <div class="mb-3">
                        <i class="bi bi-person-circle" style="font-size: 5rem; color: #0d6efd;"></i>
                    </div>
                    <h4 class="mb-1" th:text="${username}">User</h4>
                    <p class="text-muted mb-3" th:text="${user.email}">email@example.com</p>

                    <div class="d-grid gap-2">
                        <a href="/courses" class="btn btn-outline-primary">
                            <i class="bi bi-book me-2"></i>Каталог курсов
                        </a>
                        <a href="/chats" class="btn btn-outline-success">
                            <i class="bi bi-chat me-2"></i>Мои чаты
                        </a>
                    </div>

                    <hr class="my-4">

                    <form th:action="@{/logout}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-outline-danger w-100">
                            <i class="bi bi-box-arrow-right me-2"></i>Выйти
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Правая колонка - курсы пользователя -->
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="card-title mb-0">
                        <i class="bi bi-book me-2"></i>Мои курсы
                        <span th:if="${not #lists.isEmpty(user.enrolledCourses)}"
                              class="badge bg-primary ms-2"
                              th:text="${#lists.size(user.enrolledCourses)}"></span>
                    </h5>
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(user.enrolledCourses)}" class="text-center py-5">
                        <i class="bi bi-book" style="font-size: 4rem; color: #dee2e6;"></i>
                        <h5 class="mt-3 text-muted">У вас пока нет курсов</h5>
                        <a href="/courses" class="btn btn-outline-primary">
                            Все курсы
                        </a>
                    </div>

                    <div th:unless="${#lists.isEmpty(user.enrolledCourses)}" class="list-group">
                        <a th:each="course : ${user.enrolledCourses}"
                           th:href="@{/courses/{id}(id=${course.id})}"
                           class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            <div>
                                <strong th:text="${course.title}">Название курса</strong>
                                <div class="small text-muted" th:text="${course.description}">Описание</div>
                            </div>
                            <i class="bi bi-chevron-right"></i>
                        </a>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mt-4">
                <div class="card-body">
                    <h6 class="card-subtitle mb-2 text-muted">
                        <i class="bi bi-lightbulb me-2"></i>Совет
                    </h6>
                    <p class="mb-0">
                        Чтобы задать вопрос по уроку, перейдите на страницу курса,
                        откройте нужный урок и используйте AI-ассистента справа.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
