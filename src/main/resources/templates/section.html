<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Section</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .container { display: flex; gap: 20px; }
        .lesson-content { width: 60%; }
        .chat-area { width: 40%; border-left: 1px solid #ddd; padding-left: 20px; }
        .chat-tabs { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .chat-tab { padding: 5px 10px; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; }
        .chat-tab.active { background: #007bff; color: white; border-color: #007bff; }
        .chat-tab button { margin-left: 5px; background: none; border: none; color: inherit; cursor: pointer; }
        .chat-box { height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
    </style>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (опционально) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container">
    <!-- LEFT: урок -->
    <div class="lesson-content">
        <h1 th:text="${section.course.title}"></h1>
        <h2 th:text="'Урок № ' + ${section.orderIndex}"></h2>
        <div style="border:1px solid #ccc;padding:15px;border-radius:8px;">
            <div id="lessonContent"></div>
            <script th:inline="javascript">
                const lessonMarkdown = /*[[${section.content}]]*/ "";
                document.getElementById("lessonContent").innerHTML = marked.parse(lessonMarkdown);
            </script>
        </div>

        <br/>
        <a th:href="@{/courses/{id}(id=${section.course.id})}">← Назад к курсу</a>
    </div>

    <!-- RIGHT: AI CHAT -->
    <div class="chat-area">
        <h3>AI Assistant</h3>

        <!-- Вкладки с чатами -->
        <div class="chat-tabs">
            <div th:each="chat : ${sectionChats}"
                 class="chat-tab"
                 th:classappend="${chat.id == chatId} ? 'active' : ''"
                 th:onclick="'location.href=\'/courses/sections/' + ${section.id} + '?chatId=' + ${chat.id} + '\''">
                <span th:text="${chat.title}">Чат 1</span>
                <form th:action="@{/courses/sections/{id}/chats/{chatId}/delete(id=${section.id}, chatId=${chat.id})}"
                      method="post"
                      style="display: inline;"
                      onsubmit="return confirm('Удалить чат?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" style="background: none; border: none; color: inherit;">✕</button>
                </form>
            </div>

            <!-- Кнопка создания нового чата -->
            <form th:action="@{/courses/sections/{id}/chats/new(id=${section.id})}"
                  method="post"
                  style="display: inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="chat-tab" style="background: #28a745; color: white;">+ Новый чат</button>
            </form>
        </div>

        <!-- Окно чата -->
        <div th:if="${currentChat != null}">
            <div class="chat-box" id="chatBox">
                <div th:if="${#lists.isEmpty(messages)}">
                    <p style="text-align: center; color: #999;">Нет сообщений. Напишите что-нибудь!</p>
                </div>
                <div th:each="msg : ${messages}"
                     th:style="${msg.role == 'USER'} ? 'text-align: right; background: #2563eb; color: white;' : 'text-align: left; background: #e9ffe8;'"
                     style="margin: 10px; padding: 10px; border-radius: 10px;">
                    <b th:text="${msg.role == 'USER' ? 'Вы' : 'AI'}"></b><br>
                    <span th:text="${msg.content}"></span>
                </div>
            </div>

            <form th:action="@{/api/chat/chats/{chatId}/messages(chatId=${currentChat.id})}"
                  method="post"
                  style="margin-top: 20px;"
                  onsubmit="sendMessage(event, this)">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <textarea name="message" placeholder="Введите сообщение..." style="width: 100%; height: 60px;" required></textarea>
                <button type="submit">Отправить</button>
            </form>
        </div>

        <div th:if="${currentChat == null}">
            <p>Выберите или создайте чат</p>
        </div>
    </div>
</div>

<script>
    // Скролл вниз
    const chatBox = document.getElementById('chatBox');
    if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;

    // AJAX отправка сообщения (чтобы не перезагружать страницу)
    async function sendMessage(event, form) {
        event.preventDefault();
        const chatId = form.action.split('/').slice(-2, -1)[0];
        const message = form.message.value;

        const response = await fetch('/api/chat/chats/' + chatId + '/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-TOKEN': form.querySelector('input[name="_csrf"]').value
            },
            body: JSON.stringify(message)
        });

        if (response.ok) {
            // Перезагружаем страницу, чтобы показать новое сообщение
            window.location.reload();
        }
    }
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
