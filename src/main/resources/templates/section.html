<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Урок')}">
    <!-- Добавляем явное подключение темы (если layout не сработал) -->
    <link id="theme-style" rel="stylesheet" th:href="@{/css/light-theme.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <!-- Хлебные крошки -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/courses" class="text-decoration-none">Курсы</a></li>
            <li class="breadcrumb-item"><a th:href="@{/courses/{id}(id=${section.course.id})}"
                                           class="text-decoration-none" th:text="${section.course.title}"></a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="'Урок ' + ${section.orderIndex}"></li>
        </ol>
    </nav>

    <div class="row">
        <!-- Левая часть - урок -->
        <div class="col-md-7">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h2 th:text="'Урок ' + ${section.orderIndex}">Урок 1</h2>
                    <div id="lessonContent" class="mt-3"></div>
                </div>
            </div>

            <!-- Исправлено: проверяем, что completed не null -->
            <div th:if="${completed != null and !completed}" class="mb-4">
                <form th:action="@{/courses/sections/{id}/complete(id=${section.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-circle"></i> Отметить как пройденный
                    </button>
                </form>
            </div>

            <!-- Исправлено: проверяем, что completed не null и true -->
            <div th:if="${completed != null and completed}" class="alert alert-success">
                <i class="bi bi-check-circle-fill"></i> Урок пройден
            </div>
        </div>

        <!-- Правая часть - чат с AI -->
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">
                        <i class="bi bi-robot me-2"></i>AI Ассистент
                    </h5>
                    <form th:action="@{/courses/sections/{id}/chats/new(id=${section.id})}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-plus-lg"></i> Новый чат
                        </button>
                    </form>
                </div>
                <div class="card-body">
                    <!-- Вкладки чатов -->
                    <div th:if="${not #lists.isEmpty(sectionChats)}" class="mb-3">
                        <div class="d-flex gap-2 flex-wrap">
                            <a th:each="chat : ${sectionChats}"
                               th:href="@{/courses/sections/{id}(id=${section.id}, chatId=${chat.id})}"
                               class="btn btn-sm"
                               th:classappend="${chat.id == chatId} ? 'btn-primary' : 'btn-outline-secondary'"
                               th:text="${chat.title}">Чат 1</a>
                        </div>
                    </div>

                    <!-- Окно чата -->
                    <div th:if="${messages != null}">
                        <div class="chat-box" id="chatBox" style="height: 400px;">
                            <div th:each="msg : ${messages}" class="mb-3">
                                <div th:if="${msg.role == 'USER'}" class="d-flex justify-content-end">
                                    <div class="message-user p-3" style="max-width: 80%;">
                                        <div th:text="${msg.content}"></div>
                                        <div class="small text-white-50">Вы</div>
                                    </div>
                                </div>
                                <div th:if="${msg.role == 'AI'}" class="d-flex justify-content-start">
                                    <div class="message-ai p-3" style="max-width: 80%;">
                                        <div th:text="${msg.content}"></div>
                                        <div class="small text-muted">AI</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <form th:action="@{/api/chat/chats/{chatId}/messages(chatId=${chatId})}"
                              method="post"
                              class="mt-3"
                              onsubmit="sendMessage(event, this)">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <div class="input-group">
                                <textarea name="message" class="form-control" rows="2" placeholder="Введите вопрос..." required></textarea>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-send"></i>
                                </button>
                            </div>
                        </form>
                    </div>

                    <div th:if="${messages == null}" class="text-center py-5">
                        <i class="bi bi-chat-dots" style="font-size: 3rem;"></i>
                        <p class="mt-2">Выберите или создайте чат</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/courses/{id}(id=${section.course.id})}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Назад к курсу
        </a>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    // Рендеринг Markdown
    document.addEventListener('DOMContentLoaded', function() {
        const lessonContent = document.getElementById('lessonContent');
        if (lessonContent) {
            const markdown = /*[[${section.content}]]*/ '';
            lessonContent.innerHTML = marked.parse(markdown);
        }

        // Скролл чата вниз
        const chatBox = document.getElementById('chatBox');
        if (chatBox) {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    });

    // Отправка сообщения без перезагрузки
    async function sendMessage(event, form) {
        event.preventDefault();
        const chatId = form.action.split('/').slice(-2, -1)[0];
        const message = form.message.value;

        try {
            const response = await fetch('/api/chat/chats/' + chatId + '/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': form.querySelector('input[name="_csrf"]').value
                },
                body: JSON.stringify(message)
            });

            if (response.ok) {
                window.location.reload();
            }
        } catch (error) {
            console.error('Error:', error);
        }
    }
</script>
</body>
</html>
