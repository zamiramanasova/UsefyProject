<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои чаты</title>
    <style>
        .container { display: flex; gap: 20px; }
        .sidebar { width: 30%; border-right: 1px solid #ccc; padding-right: 20px; }
        .main { width: 70%; }
        .chat-item { padding: 10px; margin: 5px 0; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; }
        .chat-item:hover { background: #f0f0f0; }
        .active { background: #e0e0ff; }
        .preview { color: #666; font-size: 0.9em; }
        .message-user { text-align: right; background: #2563eb; color: white; margin: 10px; padding: 10px; border-radius: 10px; }
        .message-ai { text-align: left; background: #e9ffe8; margin: 10px; padding: 10px; border-radius: 10px; }
        .chat-box { height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<h1>Мои чаты</h1>

<div class="container">
    <!-- Левая панель - список чатов -->
    <div class="sidebar">
        <!-- ФОРМА СОЗДАНИЯ НОВОГО ЧАТА -->
        <form th:action="@{/chats}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="text" name="title" placeholder="Название нового чата" required>
            <button type="submit">+ Новый чат</button>
        </form>

        <hr>

        <div th:if="${#lists.isEmpty(sessions)}">
            <p>У вас пока нет чатов. Создайте первый!</p>
        </div>

        <!-- ВАЖНО: используем 'sessionItem' вместо 'session' в цикле -->
        <div th:each="sessionItem : ${sessions}"
             class="chat-item"
             th:classappend="${sessionItem.id == chatId} ? 'active' : ''"
             th:onclick="'location.href=\'/chats/' + ${sessionItem.id} + '\''">
            <strong th:text="${sessionItem.title}">Чат</strong>
            <div class="preview">
                <span th:text="${sessionItem.lastMessagePreview}"></span>
            </div>
            <small>
                <span th:text="${sessionItem.messageCount}"></span> сообщений
            </small>
        </div>
    </div>

    <!-- Правая панель - текущий чат -->
    <!-- ВАЖНО: используем 'currentSession' вместо 'session' -->
    <div class="main" th:if="${currentSession != null}">
        <h2 th:text="${currentSession.title}">Чат</h2>

        <!-- Окно сообщений -->
        <div class="chat-box" id="chatBox">
            <div th:if="${#lists.isEmpty(messages)}">
                <p style="text-align: center; color: #999;">Нет сообщений. Напишите что-нибудь!</p>
            </div>
            <div th:each="msg : ${messages}"
                 th:classappend="${msg.role == 'USER'} ? 'message-user' : 'message-ai'">
                <b th:text="${msg.role == 'USER' ? 'Вы' : 'AI'}"></b><br>
                <span th:text="${msg.content}"></span>
            </div>
        </div>

        <!-- ФОРМА ОТПРАВКИ СООБЩЕНИЯ -->
        <form th:action="@{/chats/{id}/message(id=${currentSession.id})}" method="post" style="margin-top: 20px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <textarea name="content" placeholder="Введите сообщение..." style="width: 100%; height: 80px;" required></textarea>
            <button type="submit">Отправить</button>
        </form>

        <!-- ФОРМА УДАЛЕНИЯ ЧАТА -->
        <form th:action="@{/chats/{id}/delete(id=${currentSession.id})}" method="post" style="margin-top: 10px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" style="background: #ff4444; color: white;" onclick="return confirm('Удалить чат?')">Удалить чат</button>
        </form>
    </div>

    <!-- Сообщение, если чат не выбран -->
    <div class="main" th:unless="${currentSession != null}">
        <p style="text-align: center; color: #999; margin-top: 50px;">Выберите чат из списка слева или создайте новый</p>
    </div>
</div>

<br>
<a href="/profile">← На главную</a>

<script>
    // Скролл вниз при загрузке
    window.onload = function() {
        const chatBox = document.getElementById('chatBox');
        if (chatBox) {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    };
</script>

</body>
</html>
