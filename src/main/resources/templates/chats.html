<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Мои чаты')}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <div class="row">
        <!-- Левая панель - список чатов -->
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="card-title mb-0">
                        <i class="bi bi-chat-text me-2"></i>Мои чаты
                    </h5>
                </div>
                <div class="card-body p-3">
                    <!-- Форма создания нового чата -->
                    <form th:action="@{/chats}" method="post" class="mb-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="input-group">
                            <input type="text" name="title" class="form-control" placeholder="Название чата" required>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-plus-lg"></i>
                            </button>
                        </div>
                    </form>

                    <div th:if="${#lists.isEmpty(sessions)}" class="text-center text-muted py-4">
                        <i class="bi bi-chat-dots" style="font-size: 3rem;"></i>
                        <p class="mt-2">У вас пока нет чатов</p>
                    </div>

                    <!-- Список чатов -->
                    <div th:unless="${#lists.isEmpty(sessions)}" class="list-group">
                        <a th:each="sessionItem : ${sessions}"
                           th:href="@{/chats/{id}(id=${sessionItem.id})}"
                           class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                           th:classappend="${sessionItem.id == chatId} ? 'active' : ''">
                            <div>
                                <strong th:text="${sessionItem.title}">Чат</strong>
                                <div class="small" th:text="${sessionItem.lastMessagePreview}"></div>
                            </div>
                            <span class="badge bg-secondary rounded-pill" th:text="${sessionItem.messageCount}">0</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Правая панель - текущий чат -->
        <div class="col-md-8" th:if="${currentChat != null}">
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <h5 class="card-title mb-0" th:text="${currentChat.title}">Чат</h5>
                    <div>
                        <a href="/chats" class="btn btn-outline-secondary btn-sm me-2">
                            <i class="bi bi-arrow-left"></i> Все чаты
                        </a>
                        <form th:action="@{/chats/{id}/delete(id=${currentChat.id})}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-outline-danger btn-sm" onclick="return confirm('Удалить чат?')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </div>
                </div>
                <div class="card-body">
                    <!-- Окно сообщений -->
                    <div class="chat-box" style="height: 400px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 8px; padding: 15px;" id="chatBox">
                        <div th:if="${#lists.isEmpty(messages)}" class="text-center text-muted py-5">
                            <i class="bi bi-chat-dots" style="font-size: 3rem;"></i>
                            <p class="mt-2">Нет сообщений. Напишите что-нибудь!</p>
                        </div>
                        <div th:each="msg : ${messages}" class="mb-3">
                            <div th:if="${msg.role == 'USER'}" class="d-flex justify-content-end">
                                <div class="p-3" style="max-width: 70%; background-color: #0d6efd; color: white; border-radius: 18px 18px 4px 18px;">
                                    <div th:text="${msg.content}"></div>
                                    <div class="small text-white-50">Вы</div>
                                </div>
                            </div>
                            <div th:if="${msg.role == 'AI'}" class="d-flex justify-content-start">
                                <div class="p-3" style="max-width: 70%; background-color: #e9ecef; color: #212529; border-radius: 18px 18px 18px 4px;">
                                    <div th:text="${msg.content}"></div>
                                    <div class="small text-muted">AI</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Форма отправки -->
                    <form th:action="@{/chats/{id}/message(id=${currentChat.id})}" method="post" class="mt-3">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="input-group">
                            <textarea name="content" class="form-control" rows="2" placeholder="Введите сообщение..." required></textarea>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-send"></i> Отправить
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Сообщение, если чат не выбран -->
        <div class="col-md-8" th:unless="${currentChat != null}">
            <div class="card shadow-sm">
                <div class="card-body text-center py-5">
                    <i class="bi bi-chat-dots" style="font-size: 4rem; color: #dee2e6;"></i>
                    <h4 class="mt-3 text-muted">Выберите чат из списка</h4>
                    <p class="text-muted">или создайте новый</p>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>

<script>
    window.onload = function() {
        const chatBox = document.getElementById('chatBox');
        if (chatBox) {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    };
</script>

<div class="text-center mt-4">
    <a href="/profile" class="btn btn-outline-secondary">
        <i class="bi bi-house-door me-2"></i>На главную
    </a>
</div>
</body>
</html>
