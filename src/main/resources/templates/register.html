<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Регистрация - Usefy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            max-width: 450px;
            width: 100%;
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
        }
        .card-header {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 2rem 2rem 1rem 2rem;
        }
        .card-body {
            padding: 2rem;
        }
    </style>
</head>
<body>
<div class="register-container">
    <div class="card shadow-lg">
        <div class="card-header text-center bg-white">
            <h2 class="mb-0">
                <i class="bi bi-chat-dots-fill me-2" style="color: #667eea;"></i>
                Usefy
            </h2>
            <p class="text-muted mt-2">Создайте новый аккаунт</p>
        </div>
        <div class="card-body">
            <form th:action="@{/register}" th:object="${registrationForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <div class="mb-3">
                    <label for="username" class="form-label">
                        <i class="bi bi-person me-2"></i>Логин
                    </label>
                    <input type="text" class="form-control form-control-lg" id="username"
                           th:field="*{username}" placeholder="Введите логин" required>
                    <div th:if="${#fields.hasErrors('username')}" class="text-danger small mt-1">
                        <i class="bi bi-exclamation-circle me-1"></i>
                        <span th:each="err : ${#fields.errors('username')}" th:text="${err}">Ошибка</span>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">
                        <i class="bi bi-envelope me-2"></i>Email
                    </label>
                    <input type="email" class="form-control form-control-lg" id="email"
                           th:field="*{email}" placeholder="Введите email" required>
                    <div th:if="${#fields.hasErrors('email')}" class="text-danger small mt-1">
                        <i class="bi bi-exclamation-circle me-1"></i>
                        <span th:each="err : ${#fields.errors('email')}" th:text="${err}">Ошибка</span>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock me-2"></i>Пароль
                    </label>
                    <input type="password" class="form-control form-control-lg" id="password"
                           th:field="*{password}" placeholder="Введите пароль" required>
                    <div th:if="${#fields.hasErrors('password')}" class="text-danger small mt-1">
                        <i class="bi bi-exclamation-circle me-1"></i>
                        <span th:each="err : ${#fields.errors('password')}" th:text="${err}">Ошибка</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                    <i class="bi bi-person-plus me-2"></i>Зарегистрироваться
                </button>

                <p class="text-center text-muted mb-0">
                    Уже есть аккаунт?
                    <a href="/login" class="text-decoration-none">Войти</a>
                </p>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
