<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${course.title})}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container">
    <!-- Хлебные крошки -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/courses" class="text-decoration-none">Курсы</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${course.title}">Текущий курс</li>
        </ol>
    </nav>

    <div class="row">
        <!-- Левая колонка - информация о курсе и уроках -->
        <div class="col-md-8">
            <!-- Карточка курса -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h2 class="card-title" th:text="${course.title}">Название курса</h2>
                    <p class="card-text" th:text="${course.description}">Описание</p>

                    <div th:if="${enrolled}" class="alert alert-success">
                        <i class="bi bi-check-circle-fill me-2"></i>Вы записаны на этот курс
                    </div>

                    <div th:if="${!enrolled}">
                        <form th:action="@{/courses/{id}/enroll(id=${course.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-pencil-square me-2"></i>Записаться на курс
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Список уроков -->
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="card-title mb-0">
                        <i class="bi bi-list-ul me-2"></i>Уроки курса
                        <span th:if="${enrolled}" class="badge bg-secondary ms-2" th:text="${completed} + '/' + ${total}"></span>
                    </h5>
                </div>
                <div class="list-group list-group-flush">
                    <div th:each="section : ${sections}"
                         class="list-group-item d-flex justify-content-between align-items-center p-3"
                         id="'section-' + ${section.id}">

                        <!-- Левая часть - ссылка на урок -->
                        <div class="flex-grow-1" style="cursor: pointer;"
                             th:onclick="'location.href=\'/courses/sections/' + ${section.id} + '\''">
                            <strong th:text="'Урок ' + ${section.orderIndex}">Урок 1</strong>
                            <div class="small text-muted" th:text="${section.content.length() > 50 ?
                    section.content.substring(0, 50) + '...' : section.content}">
                                Содержание урока
                            </div>
                        </div>

                        <!-- Правая часть - кнопка отметки -->
                        <div class="d-flex align-items-center gap-2">
                            <!-- Если урок пройден - показываем галочку -->
                            <span th:if="${completedSections[section.id]}" class="badge bg-success p-2"
                                  th:id="'status-' + ${section.id}">
                    <i class="bi bi-check-circle-fill"></i> Пройдено
                </span>

                            <!-- Если не пройден и пользователь записан - показываем кнопку -->
                            <div th:if="${enrolled and !completedSections[section.id]}">
                                <button class="btn btn-sm btn-outline-success complete-btn"
                                        th:data-section-id="${section.id}">
                                    <i class="bi bi-check-lg"></i> Отметить
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Сообщение для незаписанных пользователей -->
                    <div th:if="${!enrolled}" class="list-group-item text-center text-muted py-3">
                        <i class="bi bi-info-circle me-2"></i>
                        Чтобы открыть уроки, нужно сначала записаться на курс.
                    </div>
                </div>
            </div>
        </div>

        <!-- Правая колонка - прогресс -->
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-body text-center">
                    <i class="bi bi-bar-chart" style="font-size: 3rem; color: #0d6efd;"></i>
                    <h5 class="mt-3">Прогресс</h5>
                    <p class="display-4" th:text="${completed} + '/' + ${total}">0/3</p>

                    <!-- Прогресс-бар -->
                    <div class="progress" style="height: 10px;">
                        <div class="progress-bar" role="progressbar"
                             th:style="'width: ' + (${total > 0 ? (completed * 100 / total) : 0}) + '%'"
                             th:attr="aria-valuenow=${total > 0 ? (completed * 100 / total) : 0}"
                             aria-valuemin="0" aria-valuemax="100"></div>
                    </div>

                    <!-- Статус записи -->
                    <p class="text-muted mt-3">
                        <i th:if="${enrolled}" class="bi bi-check-circle text-success"></i>
                        <span th:text="${enrolled} ? ' Вы записаны на курс' : ' Вы не записаны'"></span>
                    </p>

                    <!-- Кнопка перехода к чатам -->
                    <a th:if="${enrolled}" href="/chats" class="btn btn-outline-primary w-100 mt-2">
                        <i class="bi bi-chat me-2"></i>Чаты курса
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
        // Находим все кнопки "Отметить"
        const completeButtons = document.querySelectorAll('.complete-btn');

        completeButtons.forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();

                const sectionId = this.getAttribute('data-section-id');
                const buttonContainer = this.closest('.d-flex');

                // Отправляем AJAX-запрос
                fetch('/courses/sections/' + sectionId + '/complete', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRF-TOKEN': /*[[${_csrf.token}]]*/ ''
                    }
                })
                    .then(response => {
                        if (response.ok) {
                            // Заменяем кнопку на галочку
                            buttonContainer.innerHTML = `
                            <span class="badge bg-success p-2">
                                <i class="bi bi-check-circle-fill"></i> Пройдено
                            </span>
                        `;

                            // Обновляем счетчик прогресса
                            updateProgressCounter();
                        } else {
                            alert('Ошибка при отметке урока');
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('Произошла ошибка');
                    });
            });
        });

        // Функция обновления счетчика прогресса
        function updateProgressCounter() {
            fetch(window.location.href, {
                method: 'GET',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
                .then(response => response.text())
                .then(html => {
                    // Обновляем счетчик в заголовке
                    const badge = document.querySelector('.badge.bg-secondary');
                    const completedCount = document.querySelectorAll('.badge.bg-success').length;
                    const totalCount = /*[[${sections.size()}]]*/ 0;

                    if (badge) {
                        badge.textContent = completedCount + '/' + totalCount;
                    }

                    // Обновляем прогресс-бар
                    const progressBar = document.querySelector('.progress-bar');
                    if (progressBar) {
                        const percent = (completedCount / totalCount) * 100;
                        progressBar.style.width = percent + '%';
                    }

                    // Обновляем цифру прогресса
                    const progressDisplay = document.querySelector('.display-4');
                    if (progressDisplay) {
                        progressDisplay.textContent = completedCount + '/' + totalCount;
                    }
                });
        }
    });
</script>
<div class="text-center mt-4">
    <a href="/profile" class="btn btn-outline-secondary">
        <i class="bi bi-house-door me-2"></i>На главную
    </a>
</div>
</body>
</html>
