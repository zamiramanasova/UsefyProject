<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' - Usefy'">Usefy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Подключаем CSS для темы -->
    <link id="theme-style" rel="stylesheet" th:href="@{/css/light-theme.css}">

    <style>
        /* Базовые стили, не зависящие от темы */
        .navbar-brand { font-weight: bold; }
        .chat-box {
            height: 400px;
            overflow-y: auto;
            border-radius: 8px;
            padding: 15px;
        }
        .message-user { border-radius: 18px 18px 4px 18px; }
        .message-ai { border-radius: 18px 18px 18px 4px; }
    </style>
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">
            <i class="bi bi-chat-dots-fill me-2"></i>Usefy
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <!-- Кнопка переключения темы -->
                <li class="nav-item">
                    <button id="theme-toggle" class="btn nav-link">
                        <i id="theme-icon" class="bi bi-moon-stars"></i>
                    </button>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/profile">
                        <i class="bi bi-person-circle me-1"></i>Профиль
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/courses">
                        <i class="bi bi-book me-1"></i>Курсы
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" href="/chats">
                        <i class="bi bi-chat me-1"></i>Чаты
                    </a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn nav-link">
                            <i class="bi bi-box-arrow-right me-1"></i>Выйти
                        </button>
                    </form>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" href="/login">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Войти
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Скрипт для переключения темы -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('theme-toggle');
            const themeIcon = document.getElementById('theme-icon');
            const themeStyle = document.getElementById('theme-style');

            // Проверяем сохранённую тему
            const savedTheme = localStorage.getItem('theme') || 'light';

            function setTheme(theme) {
                if (theme === 'dark') {
                    themeStyle.href = '/css/dark-theme.css';
                    themeIcon.className = 'bi bi-sun';
                    localStorage.setItem('theme', 'dark');
                } else {
                    themeStyle.href = '/css/light-theme.css';
                    themeIcon.className = 'bi bi-moon-stars';
                    localStorage.setItem('theme', 'light');
                }
            }

            // Устанавливаем сохранённую тему
            setTheme(savedTheme);

            // Обработчик клика
            themeToggle.addEventListener('click', function() {
                const currentTheme = localStorage.getItem('theme') || 'light';
                setTheme(currentTheme === 'light' ? 'dark' : 'light');
            });
        });
    </script>
</div>
</body>
</html>
